{% extends "base.html" %}
{% block title %}404 — route not found{% endblock %}
{% block body %}
<main class="error-page">
  <p class="error-code">404</p>
  <p class="error-status"><span class="status-dot status-dot-amber"></span>route not found</p>
  <h1>This endpoint isn’t mapped.</h1>
  <p class="error-sub">The page you asked for returned no handler. Everything else is back home.</p>
  <a class="btn btn-solid btn-lg" href="{{ url_for('index') }}">← Back to start</a>
</main>
{% endblock %}
