<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Sachal Chandio — Senior Backend Engineer{% endblock %}</title>
  <meta name="description" content="Sachal Chandio — senior software engineer specializing in backend systems, distributed data, and DevOps. NestJS, FastAPI, GraphQL, PostgreSQL, Redis, Docker, Kubernetes, AWS.">

  <meta property="og:type" content="website">
  <meta property="og:title" content="Sachal Chandio — Senior Backend Engineer">
  <meta property="og:description" content="Backends that stay fast, consistent, and observable. NestJS · FastAPI · GraphQL · PostgreSQL · Docker · Kubernetes · AWS.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="icon" href="{{ url_for('static', filename='img/favicon.svg') }}" type="image/svg+xml">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  {% block body %}{% endblock %}
  <script src="{{ url_for('static', filename='js/main.js') }}" defer></script>
  {% block scripts %}{% endblock %}
</body>
</html>
