server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  gzip on;
  gzip_types text/css application/javascript image/svg+xml application/json;

  # Long-cache hashed assets.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # API + backend-served routes proxy to the Flask service.
  location /api/    { proxy_pass http://backend:8000; proxy_set_header Host $host; }
  location /resume  { proxy_pass http://backend:8000; proxy_set_header Host $host; }
  location /healthz { proxy_pass http://backend:8000; }
  location /readyz  { proxy_pass http://backend:8000; }

  # SPA fallback — every other path serves the React app.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
