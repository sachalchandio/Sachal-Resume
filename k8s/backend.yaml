apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio-backend
  labels: { app: portfolio-backend }
spec:
  replicas: 2
  selector:
    matchLabels: { app: portfolio-backend }
  template:
    metadata:
      labels: { app: portfolio-backend }
    spec:
      containers:
        - name: api
          image: sachal-portfolio-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: PORT
              value: "8000"
          resources:
            requests: { cpu: "50m", memory: "96Mi" }
            limits: { cpu: "250m", memory: "256Mi" }
          livenessProbe:
            httpGet: { path: /healthz, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /readyz, port: 8000 }
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  # Named "backend" so the frontend nginx upstream (http://backend:8000) resolves.
  name: backend
  labels: { app: portfolio-backend }
spec:
  type: ClusterIP
  selector: { app: portfolio-backend }
  ports:
    - name: http
      port: 8000
      targetPort: 8000
