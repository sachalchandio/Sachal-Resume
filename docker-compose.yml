services:
  backend:
    build: ./backend
    image: sachal-portfolio-api:latest
    environment:
      - PORT=8000
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else sys.exit(1)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: sachal-portfolio-web:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

# The React app (nginx, :8080) proxies /api, /resume, /healthz to the Flask
# backend over the compose network. Open http://localhost:8080 after `up`.
